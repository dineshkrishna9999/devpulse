repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-ast
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-toml
      - id: check-yaml
      - id: check-json
      - id: debug-statements
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace
      - id: no-commit-to-branch
        args: [--branch, main]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.11
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.9.22
    hooks:
      - id: uv-lock

  # FirstToKnow Guard — checks new dependencies for CVEs and license changes
  # Runs on pre-push (not pre-commit) because it hits the network (OSV API)
  # and we don't want to slow down every commit, only pushes.
  - repo: local
    hooks:
      - id: firsttoknow-guard
        name: FirstToKnow Guard (dependency security)
        entry: firsttoknow-guard
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
